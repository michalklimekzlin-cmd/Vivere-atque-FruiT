<!doctype html>

<html lang="cs">
<head>
<link rel="manifest" href="./manifest.json">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bráška Hlava – VAFT</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="glyph/glyph.css">
</head>
<body>
<div class="wrapper">
<div class="hero">
<div id="sphere">
Bráška Hlava
</div>
<div id="log">
Načítám jádro...
</div>
</div>
<div class="dashboard">
<div class="card">

<h2>📦 VaFT Sklad</h2>

<div class="stat">
<span>Místní paměť</span>
<span id="localSize">0 KB</span>
</div>

<div class="stat">
<span>Vyrovnávací paměť</span>
<span id="cacheSize">0 položek</span>
</div>

<button onclick="ulozitDoSkladu()">
｡*ﾟ✲*☆(˘◡˘)☆*✲ﾟ*｡ Do skladu
</button>

<hr>

<input
type="file"
id="souborInput"
hidden
onchange="vlozitSoubor(event)"
>

<input
type="file"
accept="image/*"
id="obrazekInput"
hidden
onchange="vlozitObrazek(event)"
>

<button onclick="document.getElementById('souborInput').click()">
(∩^O^)⊃━☆ﾟ.*･｡ Soubor
</button>

<button onclick="document.getElementById('obrazekInput').click()">
(∩^O^)⊃━☆ﾟ.*･｡ Obrázek
</button>

<div id="seznamSouboru" style="margin-top:10px;font-size:.8rem;">
Zatím nejsou vloženy žádné soubory.
</div>

<img
id="nahledObrazku"
style="
display:none;
max-width:100%;
margin-top:10px;
border-radius:12px;
">
</div>
<div class="card">
<h2>🦆 Chybožrout</h2>
<button onclick="prohledatSystem()">
•ﾟ✧٩(ˊᗜˋ*)و✧ﾟ• Systém
</button>
<pre id="diagnosticOutput">
Připraven k hledání.
</pre>
</div>
<div class="card">
<h2>☁️ Přenos dat</h2>
<p>
Připojení vzdálených skladů se připravuje.
</p>
<button disabled>
GitHub sklad
</button>
<button disabled>
Google Drive sklad
</button>
</div>
</div>
</div>
<script src="../vaft.loader.js"></script>
<script src="../vaft.core.js"></script>
<script src="../vaft.heartbeat.js"></script>
<script>
const log =
document.getElementById("log");
const sphere =
document.getElementById("sphere");
const kernelState =
document.getElementById("kernelState");
const registryCount =
document.getElementById("registryCount");
const materialCount =
document.getElementById("materialCount");
async function loadKernel(){
  try{
    const res =
      await fetch(
        "../vaft.kernel.js?v=" +
        Date.now()
      );
    if(!res.ok)
      throw new Error();
    const txt =
      await res.text();
    const script =
      document.createElement("script");
    script.textContent = txt;
    document.body.appendChild(script);
    return true;
  }catch(err){
    return false;
  }
}
function updateStorageInfo(){
  let total = 0;
  for(let key in localStorage){
    if(localStorage.hasOwnProperty(key)){
      total += key.length;
      total += localStorage[key].length;
    }
  }
  document.getElementById(
    "localSize"
  ).textContent =
    (total/1024).toFixed(2) +
    " KB";
}
async function updateCacheInfo(){
  if(!("caches" in window))
    return;
  const keys =
    await caches.keys();
  document.getElementById(
    "cacheSize"
  ).textContent =
    keys.length +
    " položek";
}
function prohledatSystem(){
  const result = [];
  for(let i=0;i<localStorage.length;i++){
    const key =
      localStorage.key(i);
    const value =
      localStorage.getItem(key);
    result.push(
      key +
      " → " +
      value.length +
      " znaků"
    );
  }
  document.getElementById(
    "diagnosticOutput"
  ).textContent =
    result.join("\n") ||
    "Sklad je prázdný.";
}
function ulozitDoSkladu(){
  const backup = {};
  for(let i=0;i<localStorage.length;i++){
    const key =
      localStorage.key(i);
    backup[key] =
      localStorage.getItem(key);
  }
  const blob =
    new Blob(
      [
        JSON.stringify(
          backup,
          null,
          2
        )
      ],
      {
        type:"application/json"
      }
    );
  const a =
    document.createElement("a");
  a.href =
    URL.createObjectURL(blob);
  a.download =
"vaft-sklad-" +
new Date().toISOString().slice(0,10) +
".json";
  a.click();
}

let pocetSouboru = 0;
let pocetObrazku = 0;

function vlozitSoubor(event){

  const file = event.target.files[0];

  if(!file) return;

  pocetSouboru++;

  const seznam =
    document.getElementById(
      "seznamSouboru"
    );

  if(seznam){
    seznam.innerHTML =
      "📄 " + file.name;
  }

}

function vlozitObrazek(event){

  const file = event.target.files[0];

  if(!file) return;

  pocetObrazku++;

  const reader =
    new FileReader();

  reader.onload = function(e){

    const img =
      document.getElementById(
        "nahledObrazku"
      );

    if(img){

      img.src =
        e.target.result;

      img.style.display =
        "block";

    }

  };

  reader.readAsDataURL(file);

}
  
(async function(){
  const ok =
    await loadKernel();
  if(ok && window.VAFT){
    const state =
      VAFT.boot(
        "braska-hlava"
      );
    kernelState.textContent =
      "Aktivní";
      sphere.style.boxShadow =
  "0 0 40px lime";
    registryCount.textContent =
      state.registry.length;
    materialCount.textContent =
      state.materials.length;
    log.textContent =
      "VAFT je aktivní.";
  }else{
    kernelState.textContent =
      "Nouzový provoz";
      sphere.style.boxShadow =
  "0 0 40px orange";
    const matsKey =
      "vaft_materials_v1";
    const mats =
      JSON.parse(
        localStorage.getItem(
          matsKey
        ) || "[]"
      );
    mats.unshift({
      id:"mini-"+Date.now(),
      ts:Date.now()
    });
    localStorage.setItem(
      matsKey,
      JSON.stringify(
        mats.slice(0,200)
      )
    );
    log.textContent =
      "Nouzový záznam uložen.";
  }
  updateStorageInfo();
  updateCacheInfo();
  setInterval(()=>{
    if(window.VAFT){
      try{
        const reg =
          VAFT.getRegistry();
        const mats =
          VAFT.getMaterials();
        registryCount.textContent =
          reg.length;
        materialCount.textContent =
          mats.length;
      }catch(e){}
    }
    updateStorageInfo();
  },4000);
})();
if("serviceWorker" in navigator){
  window.addEventListener(
    "load",
    ()=>{
      navigator.serviceWorker
      .register(
        "./service-worker.js"
      )
      .catch(()=>{});
    }
  );
}
</script>
<script src="glyph/glyph.js"></script>
</body>
</html>
