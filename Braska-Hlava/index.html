<!doctype html>

<html lang="cs">
<head>
<link rel="manifest" href="./manifest.json">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bráška Hlava – VAFT</title>
<style>
:root{
  --bg:#020617;
  --card:#071730;
  --card2:#0f172a;
  --accent:#38bdf8;
  --text:#e2e8f0;
  --muted:#94a3b8;
}
*{
  box-sizing:border-box;
}
body{
  margin:0;
  background:radial-gradient(circle at center,#082348,#020617);
  color:var(--text);
  font-family:system-ui,sans-serif;
  min-height:100vh;
  padding:
    calc(env(safe-area-inset-top) + 16px)
    16px
    calc(env(safe-area-inset-bottom) + 16px);
}
.wrapper{
  max-width:900px;
  margin:auto;
}
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}
#sphere{
  width:140px;
  height:140px;
  border-radius:999px;
  background:
  radial-gradient(
    circle at 30% 30%,
    #ffffff,
    #38bdf8 25%,
    #0f172a 75%
  );
  box-shadow:
    0 0 30px rgba(56,189,248,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:.75rem;
  transition:.4s;
}
#log{
  opacity:.8;
  font-size:.8rem;
  text-align:center;
}
.dashboard{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
.card{
  background:rgba(7,23,48,.9);
  border:1px solid rgba(56,189,248,.15);
  border-radius:18px;
  padding:16px;
}
.card h2{
  margin-top:0;
}
.stat{
  display:flex;
  justify-content:space-between;
  margin:.4rem 0;
}
button{
  background:#0ea5e9;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  margin:4px;
}
button:hover{
  opacity:.9;
}
pre{
  white-space:pre-wrap;
  font-size:.75rem;
}
@media(min-width:768px){
  .dashboard{
    grid-template-columns:
      repeat(2,1fr);
  }
}
</style>
</head>
<body>
<div class="wrapper">
<div class="hero">
<div id="sphere">
Bráška Hlava
</div>
<div id="log">
Načítám jádro...
</div>
</div>
<div class="dashboard">
<div class="card">
<h2>🧠 Stav jádra</h2>
<div class="stat">
<span>Kernel</span>
<span id="kernelState">boot...</span>
</div>
<div class="stat">
<span>Bytosti</span>
<span id="registryCount">0</span>
</div>
<div class="stat">
<span>Materiály</span>
<span id="materialCount">0</span>
</div>
</div>
<div class="card">
<h2>📦 VaFT Sklad</h2>

<div class="stat">
<span>Místní paměť</span>
<span id="localSize">0 KB</span>
</div>

<div class="stat">
<span>Vyrovnávací paměť</span>
<span id="cacheSize">0 položek</span>
</div>

<button onclick="ulozitDoSkladu()">
📦 Uložit do skladu
</button>
</div>
<div class="card">
<h2>🦆 Chybožrout</h2>
<button onclick="prohledatSystem()">
🦆 Prohledat systém
</button>
<pre id="diagnosticOutput">
Připraven k hledání.
</pre>
</div>
<div class="card">
<h2>☁️ Přenos dat</h2>
<p>
Připojení vzdálených skladů se připravuje.
</p>
<button disabled>
GitHub sklad
</button>
<button disabled>
Google Drive sklad
</button>
</div>
</div>
</div>
<script src="../vaft.loader.js"></script>
<script src="../vaft.core.js"></script>
<script src="../vaft.heartbeat.js"></script>
<script>
const log =
document.getElementById("log");
const sphere =
document.getElementById("sphere");
const kernelState =
document.getElementById("kernelState");
const registryCount =
document.getElementById("registryCount");
const materialCount =
document.getElementById("materialCount");
async function loadKernel(){
  try{
    const res =
      await fetch(
        "../vaft.kernel.js?v=" +
        Date.now()
      );
    if(!res.ok)
      throw new Error();
    const txt =
      await res.text();
    const script =
      document.createElement("script");
    script.textContent = txt;
    document.body.appendChild(script);
    return true;
  }catch(err){
    return false;
  }
}
function updateStorageInfo(){
  let total = 0;
  for(let key in localStorage){
    if(localStorage.hasOwnProperty(key)){
      total += key.length;
      total += localStorage[key].length;
    }
  }
  document.getElementById(
    "localSize"
  ).textContent =
    (total/1024).toFixed(2) +
    " KB";
}
async function updateCacheInfo(){
  if(!("caches" in window))
    return;
  const keys =
    await caches.keys();
  document.getElementById(
    "cacheSize"
  ).textContent =
    keys.length +
    " položek";
}
function prohledatSystem(){
  const result = [];
  for(let i=0;i<localStorage.length;i++){
    const key =
      localStorage.key(i);
    const value =
      localStorage.getItem(key);
    result.push(
      key +
      " → " +
      value.length +
      " znaků"
    );
  }
  document.getElementById(
    "diagnosticOutput"
  ).textContent =
    result.join("\n") ||
    "Sklad je prázdný.";
}
function ulozitDoSkladu(){
  const backup = {};
  for(let i=0;i<localStorage.length;i++){
    const key =
      localStorage.key(i);
    backup[key] =
      localStorage.getItem(key);
  }
  const blob =
    new Blob(
      [
        JSON.stringify(
          backup,
          null,
          2
        )
      ],
      {
        type:"application/json"
      }
    );
  const a =
    document.createElement("a");
  a.href =
    URL.createObjectURL(blob);
  a.download =
"vaft-sklad-" +
new Date().toISOString().slice(0,10) +
".json";
  a.click();
}
(async function(){
  const ok =
    await loadKernel();
  if(ok && window.VAFT){
    const state =
      VAFT.boot(
        "braska-hlava"
      );
    kernelState.textContent =
      "Aktivní";
    registryCount.textContent =
      state.registry.length;
    materialCount.textContent =
      state.materials.length;
    log.textContent =
      "VAFT je aktivní.";
  }else{
    kernelState.textContent =
      "Nouzový provoz";
    const matsKey =
      "vaft_materials_v1";
    const mats =
      JSON.parse(
        localStorage.getItem(
          matsKey
        ) || "[]"
      );
    mats.unshift({
      id:"mini-"+Date.now(),
      ts:Date.now()
    });
    localStorage.setItem(
      matsKey,
      JSON.stringify(
        mats.slice(0,200)
      )
    );
    log.textContent =
      "Nouzový záznam uložen.";
  }
  updateStorageInfo();
  updateCacheInfo();
  setInterval(()=>{
    if(window.VAFT){
      try{
        const reg =
          VAFT.getRegistry();
        const mats =
          VAFT.getMaterials();
        registryCount.textContent =
          reg.length;
        materialCount.textContent =
          mats.length;
      }catch(e){}
    }
    updateStorageInfo();
  },4000);
})();
if("serviceWorker" in navigator){
  window.addEventListener(
    "load",
    ()=>{
      navigator.serviceWorker
      .register(
        "./service-worker.js"
      )
      .catch(()=>{});
    }
  );
}
</script>
</body>
</html>
