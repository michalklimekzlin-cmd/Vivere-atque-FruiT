<!doctype html>
<html lang="cs">
  <head>
      <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vivere atque Frui¡'T – lite</title>
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        background: #05070b;
        color: #e9f2ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px 8px;
      }
      .badge {
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: .7rem;
      }
      .panel {
        padding: 14px 16px;
      }
      #log {
        background: rgba(255,255,255,.02);
        border: 1px solid rgba(255,255,255,.03);
        border-radius: 12px;
        padding: 8px 10px;
        max-height: 55vh;
        overflow-y: auto;
        font-size: .72rem;
      }
      .row {
        margin-bottom: 4px;
        opacity: .9;
      }
      .ts { opacity: .4; margin-right: 5px; }
      .src { opacity: .7; margin-right: 5px; }
      .btn {
        background: #1494ff;
        border: none;
        color: white;
        border-radius: 9px;
        padding: 4px 10px;
        font-size: .7rem;
      }
      .quick {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div>
        <div style="font-size:.8rem;opacity:.6;">Vivere atque Frui¡'T</div>
        <div style="font-size:1.05rem;">Lite jádro</div>
      </div>
      <div class="badge" id="pulse">⏱ čekám na puls…</div>
    </div>

    <div class="panel">
      <h3 style="margin:0 0 6px;font-size:.85rem;">Tok světa</h3>
      <div id="log"></div>
      <div class="quick">
        <button class="btn" onclick="sendTest('ahoj od uživatele')">➤ poslat zprávu</button>
        <button class="btn" onclick="clearLog()">🧹 vyčistit</button>
        <button class="btn" onclick="window.location.href='../'">↩︎ zpět do plné</button>
      </div>
    </div>

    <!-- připojení mozku -->
    <script src="../vaft.bus.js"></script>
    <script src="../vaft.agents.js"></script>
    <script src="../vaft.brains.js"></script>

    <script>
      const logBox = document.getElementById('log');
      const pulseBox = document.getElementById('pulse');

      function addRow(text, from) {
        const row = document.createElement('div');
        row.className = 'row';
        const t = new Date();
        row.innerHTML = '<span class="ts">' + t.toLocaleTimeString('cs-CZ') + '</span>' +
                        (from ? '<span class="src">[' + from + ']</span>' : '') +
                        '<span>' + text + '</span>';
        logBox.prepend(row);
        while (logBox.children.length > 120) logBox.removeChild(logBox.lastChild);
      }

      function clearLog() {
        logBox.innerHTML = '';
      }

      function sendTest(txt) {
        addRow('📤 ' + txt, 'uživatel');
        if (window.VAFT && VAFT.bus) {
          VAFT.bus.emit('vaft.signal', { from: 'lite-ui', msg: { text: txt } });
        }
      }

      // vlastní puls, aby to žilo i offline
      let beat = 0;
      setInterval(() => {
        beat++;
        pulseBox.textContent = '❤️ puls ' + beat;
        addRow('puls ' + beat, '💓 systém');
      }, 2500);

      // pokud běží hlavní VAFT bus, napojíme se
      if (window.VAFT && VAFT.bus) {
        VAFT.bus.on('vaft.heartbeat', d => addRow('❤️ heartbeat ' + d.beat, d.from));
        VAFT.bus.on('vaft.output', d => addRow('💬 ' + (d.text || 'výstup'), d.from));
        VAFT.bus.on('vaft.signal', d => addRow('📡 signál', d.from));
        VAFT.bus.on('vaft.diagnostic', d => addRow('⚙️ ' + d.msg, d.from));
      } else {
        addRow('⚠️ VAFT bus není k dispozici – běžím samostatně', 'systém');
      }
    </script>
  
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
</body>
</html>
