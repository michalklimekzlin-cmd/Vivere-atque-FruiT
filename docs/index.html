<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,viewport-fit=cover"
>

<meta name="theme-color" content="#050815">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="manifest" href="./manifest.json">

<title>VaF'i'T Four Core Memory System •ア</title>

<style>
:root{
  --gold:#ffe2ad;
  --gold-soft:rgba(255,226,173,.18);
  --panel:rgba(4,5,10,.94);
  --background:#020208;
}

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(
      circle at top,
      #090d20 0%,
      #050815 40%,
      #020208 100%
    );
  color:#f5f5f5;
  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

button,
textarea{
  font:inherit;
}

.root{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    max(10px,env(safe-area-inset-top))
    max(10px,env(safe-area-inset-right))
    max(10px,env(safe-area-inset-bottom))
    max(10px,env(safe-area-inset-left));
}

.stage{
  position:relative;
  width:min(920px,96vw);
  height:min(680px,92vh);
  overflow:hidden;
  border-radius:32px;
  border:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(
      circle at 50% 42%,
      rgba(255,210,135,.07),
      transparent 34%
    ),
    radial-gradient(
      circle at top,
      #06091a,
      #020208
    );
  box-shadow:
    0 40px 90px rgba(0,0,0,.85),
    inset 0 0 60px rgba(255,210,135,.025);
}

#globe-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  touch-action:none;
}

.memoryDock{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:8;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  pointer-events:none;
}

.pill{
  border:1px solid rgba(255,220,160,.20);
  background:rgba(0,0,0,.34);
  color:var(--gold);
  border-radius:999px;
  padding:6px 9px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.03em;
  backdrop-filter:blur(8px);
}

.hud-right{
  position:absolute;
  right:18px;
  top:54px;
  z-index:4;
  font-size:10px;
  line-height:1.4;
  text-align:right;
  opacity:.82;
  pointer-events:none;
}

.hud-center{
  position:absolute;
  left:50%;
  bottom:53px;
  z-index:4;
  transform:translateX(-50%);
  font-size:11px;
  color:rgba(255,240,210,.88);
  text-align:center;
  white-space:nowrap;
  pointer-events:none;
}

.hud{
  position:absolute;
  left:18px;
  right:18px;
  bottom:15px;
  z-index:4;
  display:flex;
  justify-content:space-between;
  gap:12px;
  font-size:10px;
  line-height:1.35;
  opacity:.74;
  pointer-events:none;
}

.panel{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  z-index:10;
  display:none;
  padding:12px;
  border:1px solid rgba(255,220,160,.26);
  border-radius:22px;
  background:var(--panel);
  box-shadow:0 0 34px rgba(255,190,110,.18);
  backdrop-filter:blur(14px);
}

.panel.open{
  display:block;
}

.panelTop{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.panelTitle{
  color:var(--gold);
  font-size:14px;
  font-weight:850;
}

.panelSub{
  margin-top:2px;
  color:rgba(255,255,255,.62);
  font-size:11px;
}

.panel textarea{
  width:100%;
  min-height:118px;
  max-height:230px;
  resize:vertical;
  padding:10px;
  border:1px solid rgba(255,220,160,.18);
  border-radius:14px;
  outline:0;
  color:#fff4dc;
  background:rgba(0,0,0,.35);
  font-family:
    ui-monospace,
    SFMono-Regular,
    Menlo,
    Consolas,
    monospace;
  font-size:12px;
}

.panel textarea:focus{
  border-color:rgba(255,226,173,.52);
  box-shadow:0 0 20px rgba(255,210,150,.08);
}

.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}

button{
  border:1px solid rgba(255,220,160,.22);
  border-radius:14px;
  padding:8px 10px;
  color:var(--gold);
  background:rgba(255,220,160,.10);
  font-size:12px;
  font-weight:750;
  cursor:pointer;
}

button:active{
  transform:scale(.97);
}

button.primary{
  border:0;
  color:#120b04;
  background:var(--gold);
}

.coreLabel{
  position:absolute;
  z-index:5;
  display:none;
  min-width:148px;
  padding:8px 10px;
  border:1px solid rgba(255,220,160,.22);
  border-radius:14px;
  color:#fff0cf;
  background:rgba(2,3,8,.80);
  box-shadow:0 10px 30px rgba(0,0,0,.45);
  pointer-events:none;
}

.coreLabel strong{
  display:block;
  color:var(--gold);
  font-size:12px;
}

.coreLabel span{
  display:block;
  margin-top:2px;
  font-size:10px;
  opacity:.68;
}

@media(max-width:520px){
  .stage{
    height:92vh;
    border-radius:24px;
  }

  .hud-right{
    right:12px;
    font-size:9px;
  }

  .hud{
    left:12px;
    right:12px;
    font-size:9px;
  }

  .panel textarea{
    min-height:98px;
  }
}
</style>
</head>

<body>

<div class="root">
  <main class="stage">

    <canvas id="globe-canvas"></canvas>

    <div class="memoryDock">
      <div class="pill">ZEMĚ · 70 SLOTŮ</div>
      <div class="pill">JAZYK · 70 SLOTŮ</div>
      <div class="pill">HRA · 70 SLOTŮ</div>
      <div class="pill">ŘÍZENÍ · 70 SLOTŮ</div>
    </div>

    <div class="hud-right">
      VaF'i'T<br>
      Four Core Memory System<br>
      režim: propojená paměť
    </div>

    <div class="hud-center">
      Klepni na jedno ze čtyř paměťových jader
    </div>

    <div class="hud">
      <span>1 prst: otáčení</span>
      <span>klepnutí: otevřít jádro</span>
      <span>offline localStorage</span>
    </div>

    <div id="coreLabel" class="coreLabel">
      <strong id="labelTitle"></strong>
      <span id="labelText"></span>
    </div>

    <section id="memoryPanel" class="panel">
      <div class="panelTop">
        <div>
          <div id="panelTitle" class="panelTitle">
            Paměťové jádro
          </div>

          <div id="panelSub" class="panelSub">
            Vyber jádro na mapě.
          </div>
        </div>

        <button id="closePanel" type="button">
          Zavřít
        </button>
      </div>

      <textarea
        id="memoryText"
        spellcheck="false"
        placeholder="Sem můžeš zapisovat paměť vybraného jádra..."
      ></textarea>

      <div class="row">
        <button id="saveMemory" class="primary" type="button">
          Uložit paměť
        </button>

        <button id="exportMemory" type="button">
          Exportovat
        </button>

        <button id="clearMemory" type="button">
          Vymazat
        </button>
      </div>
    </section>

  </main>
</div>

<script>
"use strict";

const canvas = document.getElementById("globe-canvas");
const context = canvas.getContext("2d");

const panel = document.getElementById("memoryPanel");
const panelTitle = document.getElementById("panelTitle");
const panelSub = document.getElementById("panelSub");
const memoryText = document.getElementById("memoryText");

const closePanel = document.getElementById("closePanel");
const saveMemory = document.getElementById("saveMemory");
const clearMemory = document.getElementById("clearMemory");
const exportMemory = document.getElementById("exportMemory");

const coreLabel = document.getElementById("coreLabel");
const labelTitle = document.getElementById("labelTitle");
const labelText = document.getElementById("labelText");

const STORAGE_PREFIX = "vaft_four_core_";

const cores = [
  {
    id:"earth",
    title:"Země",
    subtitle:"Modeling, světy a úhel pohledu",
    angle:-Math.PI * 0.72,
    radius:50
  },
  {
    id:"language",
    title:"Jazyk",
    subtitle:"Písmena, symboly, glyphy a význam",
    angle:-Math.PI * 0.18,
    radius:50
  },
  {
    id:"game",
    title:"Hra",
    subtitle:"Pravidla, události a postup",
    angle:Math.PI * 0.34,
    radius:50
  },
  {
    id:"control",
    title:"Řízení",
    subtitle:"Směrování, jednotky a propojení",
    angle:Math.PI * 0.86,
    radius:50
  }
];

let width = 0;
let height = 0;
let pixelRatio = 1;

let rotation = 0;
let rotationVelocity = 0.0015;
let selectedCore = null;

let dragging = false;
let movedDuringDrag = false;
let previousPointerX = 0;

function resizeCanvas(){
  const rectangle = canvas.getBoundingClientRect();

  pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
  width = rectangle.width;
  height = rectangle.height;

  canvas.width = Math.round(width * pixelRatio);
  canvas.height = Math.round(height * pixelRatio);

  context.setTransform(
    pixelRatio,
    0,
    0,
    pixelRatio,
    0,
    0
  );
}

function getCorePosition(core){
  const orbitRadius = Math.min(width, height) * 0.28;
  const centerX = width / 2;
  const centerY = height / 2 + 8;

  const angle = core.angle + rotation;

  return {
    x:centerX + Math.cos(angle) * orbitRadius,
    y:centerY + Math.sin(angle) * orbitRadius * 0.52,
    depth:(Math.sin(angle) + 1) / 2
  };
}

function drawBackground(){
  const centerX = width / 2;
  const centerY = height / 2;

  const glow = context.createRadialGradient(
    centerX,
    centerY,
    10,
    centerX,
    centerY,
    Math.min(width, height) * 0.52
  );

  glow.addColorStop(0,"rgba(255,220,155,.08)");
  glow.addColorStop(.42,"rgba(80,100,180,.025)");
  glow.addColorStop(1,"rgba(0,0,0,0)");

  context.fillStyle = glow;
  context.fillRect(0,0,width,height);

  context.save();
  context.globalAlpha = .22;
  context.fillStyle = "#ffe2ad";

  for(let index = 0; index < 70; index++){
    const x = (index * 83.71) % width;
    const y = (index * 47.29) % height;
    const size = index % 7 === 0 ? 1.3 : .55;

    context.beginPath();
    context.arc(x,y,size,0,Math.PI * 2);
    context.fill();
  }

  context.restore();
}

function drawConnections(){
  const positions = cores.map(getCorePosition);

  context.save();
  context.lineWidth = 1;

  for(let first = 0; first < positions.length; first++){
    for(let second = first + 1; second < positions.length; second++){
      const gradient = context.createLinearGradient(
        positions[first].x,
        positions[first].y,
        positions[second].x,
        positions[second].y
      );

      gradient.addColorStop(0,"rgba(255,226,173,.08)");
      gradient.addColorStop(.5,"rgba(255,226,173,.28)");
      gradient.addColorStop(1,"rgba(255,226,173,.08)");

      context.strokeStyle = gradient;
      context.beginPath();
      context.moveTo(
        positions[first].x,
        positions[first].y
      );
      context.lineTo(
        positions[second].x,
        positions[second].y
      );
      context.stroke();
    }
  }

  context.restore();
}

function drawCenterCore(time){
  const centerX = width / 2;
  const centerY = height / 2 + 8;
  const pulse = 1 + Math.sin(time * 0.002) * 0.045;

  context.save();

  for(let ring = 0; ring < 5; ring++){
    context.beginPath();
    context.arc(
      centerX,
      centerY,
      (36 + ring * 13) * pulse,
      0,
      Math.PI * 2
    );

    context.strokeStyle =
      `rgba(255,220,160,${0.20 - ring * 0.028})`;

    context.lineWidth = 1;
    context.stroke();
  }

  const coreGlow = context.createRadialGradient(
    centerX,
    centerY,
    0,
    centerX,
    centerY,
    48
  );

  coreGlow.addColorStop(0,"rgba(255,240,200,.88)");
  coreGlow.addColorStop(.18,"rgba(255,190,100,.48)");
  coreGlow.addColorStop(1,"rgba(255,190,100,0)");

  context.fillStyle = coreGlow;
  context.beginPath();
  context.arc(centerX,centerY,48,0,Math.PI * 2);
  context.fill();

  context.fillStyle = "#fff0cf";
  context.font = "800 12px system-ui";
  context.textAlign = "center";
  context.textBaseline = "middle";
  context.fillText("VaF'i'T",centerX,centerY - 4);

  context.fillStyle = "rgba(255,240,210,.65)";
  context.font = "9px system-ui";
  context.fillText("MEMORY BUS",centerX,centerY + 12);

  context.restore();
}

function drawCore(core,time){
  const position = getCorePosition(core);
  const scale = .72 + position.depth * .40;
  const radius = core.radius * scale;
  const active = selectedCore && selectedCore.id === core.id;

  context.save();

  context.globalAlpha = .48 + position.depth * .52;

  const glow = context.createRadialGradient(
    position.x,
    position.y,
    2,
    position.x,
    position.y,
    radius * 1.45
  );

  glow.addColorStop(
    0,
    active
      ? "rgba(255,245,215,.95)"
      : "rgba(255,225,175,.74)"
  );

  glow.addColorStop(
    .24,
    active
      ? "rgba(255,185,95,.52)"
      : "rgba(255,185,95,.25)"
  );

  glow.addColorStop(1,"rgba(255,185,95,0)");

  context.fillStyle = glow;
  context.beginPath();
  context.arc(
    position.x,
    position.y,
    radius * 1.45,
    0,
    Math.PI * 2
  );
  context.fill();

  context.strokeStyle =
    active
      ? "rgba(255,240,205,.94)"
      : "rgba(255,220,160,.54)";

  context.lineWidth = active ? 1.8 : 1;

  context.beginPath();
  context.arc(
    position.x,
    position.y,
    radius,
    0,
    Math.PI * 2
  );
  context.stroke();

  for(let ring = 1; ring < 5; ring++){
    context.beginPath();

    context.ellipse(
      position.x,
      position.y,
      radius,
      radius * ring / 5,
      0,
      0,
      Math.PI * 2
    );

    context.strokeStyle =
      `rgba(255,220,160,${active ? .30 : .17})`;

    context.lineWidth = .7;
    context.stroke();
  }

  for(let line = 0; line < 8; line++){
    const angle = line / 8 * Math.PI;

    context.beginPath();

    context.ellipse(
      position.x,
      position.y,
      Math.abs(Math.cos(angle)) * radius,
      radius,
      0,
      0,
      Math.PI * 2
    );

    context.strokeStyle =
      `rgba(255,220,160,${active ? .25 : .13})`;

    context.lineWidth = .7;
    context.stroke();
  }

  const pulse =
    radius +
    7 +
    Math.sin(time * .003 + core.angle) * 3;

  context.beginPath();
  context.arc(
    position.x,
    position.y,
    pulse,
    0,
    Math.PI * 2
  );

  context.strokeStyle =
    active
      ? "rgba(255,235,195,.34)"
      : "rgba(255,220,160,.10)";

  context.stroke();

  context.fillStyle = "#fff0cf";
  context.font = `800 ${Math.round(11 * scale)}px system-ui`;
  context.textAlign = "center";
  context.textBaseline = "middle";
  context.fillText(
    core.title,
    position.x,
    position.y - 4
  );

  context.fillStyle = "rgba(255,240,210,.65)";
  context.font = `${Math.max(8,Math.round(9 * scale))}px system-ui`;
  context.fillText(
    "70 SLOTŮ",
    position.x,
    position.y + 12
  );

  context.restore();

  core.position = position;
  core.drawRadius = radius;
}

function render(time){
  context.clearRect(0,0,width,height);

  drawBackground();
  drawConnections();
  drawCenterCore(time);

  const orderedCores = [...cores].sort((first,second)=>{
    return getCorePosition(first).depth -
      getCorePosition(second).depth;
  });

  for(const core of orderedCores){
    drawCore(core,time);
  }

  if(!dragging){
    rotation += rotationVelocity;
  }

  requestAnimationFrame(render);
}

function findCoreAt(x,y){
  const orderedCores = [...cores].sort((first,second)=>{
    return getCorePosition(second).depth -
      getCorePosition(first).depth;
  });

  return orderedCores.find(core=>{
    if(!core.position){
      return false;
    }

    const differenceX = x - core.position.x;
    const differenceY = y - core.position.y;
    const distance = Math.hypot(
      differenceX,
      differenceY
    );

    return distance <= core.drawRadius + 16;
  });
}

function showCoreLabel(core){
  if(!core || !core.position){
    coreLabel.style.display = "none";
    return;
  }

  labelTitle.textContent = core.title;
  labelText.textContent = core.subtitle;

  coreLabel.style.left =
    `${Math.min(width - 175,core.position.x + 18)}px`;

  coreLabel.style.top =
    `${Math.max(58,core.position.y - 24)}px`;

  coreLabel.style.display = "block";
}

function openCore(core){
  selectedCore = core;

  panelTitle.textContent =
    `${core.title} · paměťové jádro`;

  panelSub.textContent =
    `${core.subtitle} · kapacita 70 slotů`;

  memoryText.value =
    localStorage.getItem(
      STORAGE_PREFIX + core.id
    ) || "";

  panel.classList.add("open");
  coreLabel.style.display = "none";
}

canvas.addEventListener("pointerdown",event=>{
  dragging = true;
  movedDuringDrag = false;
  previousPointerX = event.clientX;

  canvas.setPointerCapture(event.pointerId);
});

canvas.addEventListener("pointermove",event=>{
  const rectangle = canvas.getBoundingClientRect();
  const x = event.clientX - rectangle.left;
  const y = event.clientY - rectangle.top;

  if(dragging){
    const differenceX =
      event.clientX - previousPointerX;

    if(Math.abs(differenceX) > 2){
      movedDuringDrag = true;
    }

    rotation += differenceX * .007;
    previousPointerX = event.clientX;
  }else{
    showCoreLabel(findCoreAt(x,y));
  }
});

canvas.addEventListener("pointerup",event=>{
  const rectangle = canvas.getBoundingClientRect();
  const x = event.clientX - rectangle.left;
  const y = event.clientY - rectangle.top;

  dragging = false;

  if(!movedDuringDrag){
    const core = findCoreAt(x,y);

    if(core){
      openCore(core);
    }
  }
});

canvas.addEventListener("pointerleave",()=>{
  if(!dragging){
    coreLabel.style.display = "none";
  }
});

closePanel.addEventListener("click",()=>{
  panel.classList.remove("open");
});

saveMemory.addEventListener("click",()=>{
  if(!selectedCore){
    return;
  }

  localStorage.setItem(
    STORAGE_PREFIX + selectedCore.id,
    memoryText.value
  );

  saveMemory.textContent = "Uloženo ✓";

  window.setTimeout(()=>{
    saveMemory.textContent = "Uložit paměť";
  },1200);
});

clearMemory.addEventListener("click",()=>{
  if(!selectedCore){
    return;
  }

  const confirmed = window.confirm(
    `Vymazat uloženou paměť jádra ${selectedCore.title}?`
  );

  if(!confirmed){
    return;
  }

  localStorage.removeItem(
    STORAGE_PREFIX + selectedCore.id
  );

  memoryText.value = "";
});

exportMemory.addEventListener("click",()=>{
  if(!selectedCore){
    return;
  }

  const exportData = {
    system:"VaF'i'T Four Core Memory System",
    core:selectedCore.id,
    title:selectedCore.title,
    slots:70,
    memory:memoryText.value,
    exportedAt:new Date().toISOString()
  };

  const file = new Blob(
    [JSON.stringify(exportData,null,2)],
    {
      type:"application/json"
    }
  );

  const url = URL.createObjectURL(file);
  const link = document.createElement("a");

  link.href = url;
  link.download =
    `${selectedCore.id}_memory.json`;

  document.body.appendChild(link);
  link.click();
  link.remove();

  URL.revokeObjectURL(url);
});

window.addEventListener("resize",resizeCanvas);

resizeCanvas();
requestAnimationFrame(render);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker
      .register("./service-worker.js")
      .catch(error=>{
        console.log(
          "Service Worker zatím není aktivní:",
          error
        );
      });
  });
}
</script>

</body>
</html>
