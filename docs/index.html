<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050815">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>VaF'i'T Paměť •ア</title>
<link rel="stylesheet" href="./css/pamet.css">
</head>
<body>
<div class="root">
  <main class="stage">
    <canvas id="globe-canvas"></canvas>

    <div class="memoryDock">
      <div class="pill" id="pill-earth">ZEMĚ · 0/70</div>
      <div class="pill" id="pill-language">JAZYK · 0/70</div>
      <div class="pill" id="pill-game">HRA · 0/70</div>
      <div class="pill" id="pill-control">ŘÍZENÍ · 0/70</div>
    </div>

    <div class="hud-right">
      VaF'i'T<br>
      Paměť<br>
      režim: lokální úložiště
    </div>

    <div class="hud-center">Klepni na jedno ze čtyř paměťových jader</div>

    <div class="hud">
      <span>1 prst: otáčení</span>
      <span>klepnutí: otevřít jádro</span>
      <span>uložení: localStorage</span>
    </div>

    <section id="memoryPanel" class="panel">
      <div class="panelTop">
        <div>
          <div id="panelTitle" class="panelTitle">Paměťové jádro</div>
          <div id="panelSub" class="panelSub">70 samostatných slotů</div>
        </div>
        <button id="closePanel" type="button">Zavřít</button>
      </div>

      <div class="slotsToolbar">
        <input id="searchInput" type="search" placeholder="Hledat ve slotech...">
        <button id="exportCore" type="button">Export jádra</button>
        <button id="importCore" type="button">Import jádra</button>
      </div>

      <div id="slotGrid" class="slotGrid"></div>

      <div id="slotEditor" class="slotEditor">
        <input id="slotName" type="text" maxlength="80" placeholder="Název slotu">
        <textarea id="slotContent" placeholder="Obsah slotu..."></textarea>
        <div class="row">
          <button id="saveSlot" class="primary" type="button">Uložit slot</button>
          <button id="clearSlot" class="danger" type="button">Vymazat slot</button>
        </div>
      </div>

      <div id="statusBox" class="statusBox">Vyber slot.</div>

      <div class="row">
        <button id="exportAll" type="button">Export celé Paměti</button>
        <button id="importAll" type="button">Import celé Paměti</button>
      </div>

      <input id="fileInput" class="hiddenInput" type="file" accept="application/json,.json">
    </section>
  </main>
</div>

<script type="module" src="./js/aplikace.js"></script>
<script type="module" src="./js/cht-zivot.js"></script>
</body>
</html>
