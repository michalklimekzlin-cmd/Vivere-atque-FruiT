<!doctype html>
<html lang="cs">
  <head>
      <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Michal AI Al Klimek • Vivere atque Frui¡'T</title>
    <link rel="stylesheet" href="./style.css?v=1.0">
  </head>
  <body>
    <div class="screen">
      <div class="head-label">
        Michal | AI | AI | Klimek
      </div>

      <!-- 1) horní přepínací -->
      <div class="glyph-slot slot-left-1" data-slot="left-1">
        <div class="glyph-text" id="moodGlyph"></div>
      </div>

      <!-- 2) psací vlevo -->
      <div class="glyph-slot slot-left-2" data-slot="left-2">
        <div class="glyph-text" contenteditable="true"></div>
      </div>
      <div class="glyph-slot slot-left-3" data-slot="left-3">
        <div class="glyph-text" contenteditable="true"></div>
      </div>
      <div class="glyph-slot slot-left-4" data-slot="left-4">
        <div class="glyph-text" contenteditable="true"></div>
      </div>

      <!-- 3) vpravo dole -->
      <div class="glyph-slot slot-bottom-right-1" data-slot="br-1">
        <div class="glyph-text" contenteditable="true"></div>
      </div>

      <!-- tlačítko na změnu pozadí -->
      <button class="transform-btn" id="transformBtn">
        I ❤️
      </button>
    </div>

    <script src="./app.js?v=1.0"></script>
  
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
</body>
</html>
